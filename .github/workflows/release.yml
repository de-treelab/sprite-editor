name: Release Build

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  version:
    if: github.event_name != 'pull_request' || github.event.action == 'enqueued'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          minor_pattern: "/^feat/"

      - name: Print version
        run: echo "Release version ${{ steps.version.outputs.version }}"

  build:
    if: github.event_name != 'pull_request' || github.event.action == 'enqueued'
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Stamp version into Cargo.toml and tauri.conf.json
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = process.argv[1];
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          " "$VERSION"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi

  release:
    if: github.event_name != 'pull_request' || github.event.action == 'enqueued'
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.tag }}
          name: v${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.rpm
            artifacts/linux/**/*.AppImage
            artifacts/windows/**/*.msi
